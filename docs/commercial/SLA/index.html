    <!-- Global Scripts: Modal & Animations -->
    <script>
        (function () {
            // --- 2. Global Modal Logic ---
            const modal = document.getElementById('global-booking-modal');
            const frame = modal.querySelector('iframe');
            const loader = modal.querySelector('.bb-loading');
            const closeBtn = modal.querySelector('.bb-close');
            const backdrop = modal.querySelector('.bb-backdrop');
            const LC_URL = 'https://api.leadconnectorhq.com/widget/booking/DXh5uGCZVjFLPQNeKRZu';
            let isLoaded = false;
            let isLoading = false;
            let lastFocused;

            function loadCalendar() {
                if (isLoaded || isLoading) return;
                isLoading = true;
                frame.src = LC_URL;
                // Inject script if missing
                if (!document.querySelector('script[src*="msgsndr.com"]')) {
                    const s = document.createElement('script');
                    s.src = 'https://link.msgsndr.com/js/form_embed.js';
                    s.async = true;
                    document.body.appendChild(s);
                }
                frame.onload = () => {
                    loader.classList.add('hidden');
                    isLoaded = true;
                    isLoading = false;
                }
            }

            function openModal(e) {
                e.preventDefault();
                lastFocused = document.activeElement;
                loadCalendar();
                modal.removeAttribute('aria-hidden');
                modal.setAttribute('open', '');
                document.body.style.overflow = 'hidden';
                closeBtn.focus();
            }

            function closeModal() {
                modal.removeAttribute('open');
                modal.setAttribute('aria-hidden', 'true');
                document.body.style.overflow = '';
                if (lastFocused) lastFocused.focus();
            }

            // Attach listeners
            const triggers = document.querySelectorAll('a[href="#book"], [data-action="open-booking"], [data-cta="book-call"], .cta[href="#book"], .cta');

            triggers.forEach(trigger => {
                trigger.addEventListener('click', openModal);
            });

            // Load calendar immediately when page finishes loading
            window.addEventListener('load', () => {
                // Short delay to prioritize critical render path
                setTimeout(loadCalendar, 100);
            });

            document.addEventListener('click', (e) => {
                const trigger = e.target.closest('a[href="#book"], [data-action="open-booking"], [data-cta="book-call"], .cta[href="#book"], .cta');
                if (trigger && !Array.from(triggers).includes(trigger)) {
                    // Handle dynamically added triggers if any
                    openModal(e);
                }
            });

            [closeBtn, backdrop].forEach(el => el && el.addEventListener('click', closeModal));
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modal.hasAttribute('open')) closeModal();
            });
        })();
    </script>
