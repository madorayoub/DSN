<body>

    <!-- Section: Header (dark bar) | Namespace: ns-header-8c3a -->
    <section class="ns-header-8c3a" data-section="header" aria-label="Site Header">
        <style>
            .ns-header-8c3a {
                /* changed: header bg set to #0a1416 to match logo color */
                --hdr-bg: #0a1416;
                --hdr-ink: #fefefe;
                --hdr-accent: #2fcc41;
                --hdr-radius: 12px;
                font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
                color: var(--hdr-ink);
                background: var(--hdr-bg);
            }

            .ns-header-8c3a :where(*, *::before, *::after) {
                box-sizing: border-box
            }

            .ns-header-8c3a :where(h1, h2, h3, p) {
                margin: 0
            }

            .ns-header-8c3a :where(img, svg) {
                display: block;
                max-width: 100%
            }

            .ns-header-8c3a :where(a) {
                color: inherit;
                text-decoration: none
            }

            .ns-header-8c3a :where(button) {
                font: inherit;
                color: inherit;
                background: none;
                border: none;
                cursor: pointer
            }

            .ns-header-8c3a :where(:focus-visible) {
                outline: 2px solid var(--hdr-accent);
                outline-offset: 2px;
                border-radius: 8px
            }

            .ns-header-8c3a .wrap {
                max-width: 1100px;
                margin-inline: auto;
                padding: 10px 16px;
                /* grid kept symmetric so center column stays centered on all breakpoints */
                display: grid;
                grid-template-columns: 1fr auto 1fr;
                align-items: center;
                min-height: 64px;
            }

            /* center brand on all viewports */
            .ns-header-8c3a .brand {
                justify-self: center;
                display: flex;
                align-items: center;
                gap: 12px
            }

            .ns-header-8c3a .logo {
                height: 56px;
                width: auto;
                border-radius: 8px;
                background: #0b1517;
                padding: 4px;
                box-shadow: 0 1px 0 rgba(255, 255, 255, .08) inset
            }

            .ns-header-8c3a .actions {
                justify-self: end;
                display: none;
                gap: 10px
            }

            @media (min-width:768px) {

                /* keep 1fr auto 1fr so the logo remains centered on desktop */
                .ns-header-8c3a .wrap {
                    grid-template-columns: 1fr auto 1fr
                }

                /* removed previous justify-self:start to keep logo centered on desktop */
                .ns-header-8c3a .logo {
                    height: 64px
                }

                .ns-header-8c3a .actions {
                    display: flex
                }
            }
        </style>

        <div class="wrap">
            <span></span>
            <a class="brand" href="/" aria-label="Direct Sales Network Home">
                <img class="logo"
                    src="https://res.cloudinary.com/diptffkzh/image/upload/v1759298117/a6217701-00a9-4fe2-9a1c-ed4e14b1a035_1_ywzdfl.png"
                    alt="Direct Sales Network logo">
            </a>
            <div class="actions"></div>
        </div>
    </section>

    <!-- Section: Reschedule Content | Namespace: ns-reschedule -->
    <section class="ns-reschedule" data-section="reschedule" aria-label="Reschedule page">
        <style>
            /* === ns-reschedule : theme knobs === */
            .ns-reschedule {
                --rs-bg: #f8fafc;
                --rs-ink: #111316;
                --rs-muted: #515a67;
                --rs-accent: #2fcc41;
                --rs-card: #ffffff;
                --rs-hair: #e6ebf0;
                --rs-radius: 16px;
                --rs-shadow: 0 10px 30px rgba(17, 19, 22, .08);
                --rs-pad: clamp(1rem, 4vw, 2.5rem);

                color: var(--rs-ink);
                background: var(--rs-bg);
                font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
                line-height: 1.45;
                min-height: calc(100vh - 64px);
                /* account for header */
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: flex-start;
                padding-top: clamp(1.5rem, 5vw, 3rem);
                /* reduced from 2rem/4rem */
                padding-bottom: clamp(1.5rem, 5vw, 3rem);
            }

            /* Local reset */
            .ns-reschedule :where(*, *::before, *::after) {
                box-sizing: border-box
            }

            .ns-reschedule :where(h1, h2, h3, h4, p) {
                margin: 0
            }

            .ns-reschedule .container {
                width: 100%;
                max-width: 800px;
                margin: 0 auto;
                padding: 0 20px;
                text-align: center;
            }

            /* Mobile padding optimization */
            @media (max-width: 767px) {
                .ns-reschedule {
                    padding-top: 1rem;
                    padding-bottom: 1rem;
                }

                .ns-reschedule .container {
                    padding: 0 16px;
                }
            }

            /* Update Icon (Clock/Refresh style) */
            .ns-reschedule .update-icon {
                width: clamp(50px, 15vw, 80px);
                height: clamp(50px, 15vw, 80px);
                margin: 0 auto clamp(1rem, 3vw, 1.5rem);
                background: rgba(47, 204, 65, 0.1);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                color: var(--rs-accent);
                animation: floatIcon 3s ease-in-out infinite;
            }

            @keyframes floatIcon {

                0%,
                100% {
                    transform: translateY(0);
                }

                50% {
                    transform: translateY(-5px);
                }
            }

            .ns-reschedule .update-icon svg {
                width: clamp(24px, 8vw, 40px);
                height: clamp(24px, 8vw, 40px);
                stroke: currentColor;
                stroke-width: 2.5;
                fill: none;
                stroke-linecap: round;
                stroke-linejoin: round;
            }

            /* Typography */
            .ns-reschedule .page-title {
                font-weight: 900;
                font-size: clamp(1.8rem, 4vw, 2.5rem);
                margin-bottom: 0.5rem;
                color: var(--rs-ink);
                letter-spacing: -0.02em;
            }

            .ns-reschedule .page-subtitle {
                font-size: clamp(1rem, 2.5vw, 1.2rem);
                color: var(--rs-muted);
                margin-bottom: 1.5rem;
                /* reduced from 2rem for mobile */
                max-width: 500px;
                margin-left: auto;
                margin-right: auto;
            }

            /* Calendar Wrapper - Optimized for mobile */
            .ns-reschedule .calendar-card {
                background: var(--rs-card);
                border-radius: var(--rs-radius);
                padding: clamp(10px, 2vw, 20px);
                box-shadow: var(--rs-shadow);
                border: 1px solid var(--rs-hair);
                overflow: hidden;
                min-height: 400px;
            }

            /* Mobile optimization for GHL Calendar */
            @media (max-width: 480px) {
                .ns-reschedule .calendar-card {
                    padding: 8px;
                    /* minimal padding on very small screens */
                    border-radius: 12px;
                }
            }

            @media (prefers-reduced-motion: reduce) {
                .ns-reschedule * {
                    animation: none !important;
                }
            }
        </style>

        <div class="container">

            <div class="update-icon">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
            </div>

            <h1 class="page-title">Reschedule Your Call</h1>
            <p class="page-subtitle">Life happens. Select a new time below that works best for your schedule.</p>

            <div class="calendar-card">
                <iframe src="https://api.leadconnectorhq.com/widget/booking/DXh5uGCZVjFLPQNeKRZu"
                    style="width: 100%;border:none;overflow: hidden;" scrolling="no"
                    id="DXh5uGCZVjFLPQNeKRZu_1772032355551">
                </iframe>
                <script src="https://link.msgsndr.com/js/form_embed.js" type="text/javascript"></script>
            </div>

        </div>
    </section>

    <!-- Section: Footer | Namespace: ns-footer-5d1e -->
    <section class="ns-footer-5d1e" data-section="footer" aria-label="Site Footer">
        <style>
            .ns-footer-5d1e {
                --bg: #f8fafc;
                --ink: #122023;
                --muted: #515a67;
                --hair: #e6ebf0;
                font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
                color: var(--muted);
                background: var(--bg);
                border-top: 1px solid var(--hair);
            }

            .ns-footer-5d1e :where(*, *::before, *::after) {
                box-sizing: border-box
            }

            .ns-footer-5d1e :where(p) {
                margin: 0
            }

            .ns-footer-5d1e :where(a) {
                color: inherit;
                text-decoration: underline;
                text-underline-offset: 2px
            }

            .ns-footer-5d1e .wrap {
                max-width: 1100px;
                margin-inline: auto;
                padding: 18px 16px 28px;
                text-align: center;
                font-size: .86rem
            }
        </style>

        <div class="wrap">
            <p>© <span data-year></span> Direct Sales Network · All rights reserved</p>
        </div>

        <script>
            (function () {
                const root = document.currentScript.closest('section.ns-footer-5d1e'); if (!root) return;
                const y = root.querySelector('[data-year]'); if (y) y.textContent = new Date().getFullYear();
            })();
        </script>
    </section>

</body>
